<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carte Mentale Portfolio — Data Analyst</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --navy: #1a2e4a;
      --navy-deep: #0f1d30;
      --gold: #C9A84C;
      --gold-light: #e0c06a;
      --text: #e8e4d8;
      --text-muted: #9fa8b5;
      --border: rgba(201,168,76,0.2);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { height:100%; }
    body {
      background: var(--navy-deep);
      color: var(--text);
      font-family: 'Jost', sans-serif;
      font-weight: 300;
      display: flex;
      flex-direction: column;
    }
 
    /* HEADER */
    header {
      padding: 24px 40px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      background: rgba(15,29,48,0.95);
      backdrop-filter: blur(8px);
    }
    .header-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }
    .gold-bar {
      width: 3px;
      height: 36px;
      background: linear-gradient(180deg, var(--gold), transparent);
      border-radius: 2px;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 300;
      color: var(--text);
      line-height: 1.2;
    }
    h1 em {
      font-style: italic;
      color: var(--gold-light);
      font-size: 14px;
      display: block;
      margin-top: 2px;
    }
    .eyebrow {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .btn-miro {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(201,168,76,0.1);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 18px;
      font-size: 12px;
      font-family: 'Jost', sans-serif;
      font-weight: 500;
      letter-spacing: 0.08em;
      color: var(--gold-light);
      text-decoration: none;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-miro:hover {
      background: rgba(201,168,76,0.2);
      border-color: var(--gold);
    }
 
    /* EMBED */
    .embed-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 0;
      min-height: 0;
    }
    .embed-wrap iframe {
      flex: 1;
      width: 100%;
      height: 100%;
      min-height: 600px;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
 
<header>
  <div class="header-left">
    <div class="gold-bar"></div>
    <div>
      <div class="eyebrow">Data ESN · Projet 13</div>
      <h1>Carte Mentale Portfolio<em>Laurent M. · Data Analyst</em></h1>
    </div>
  </div>
  <a class="btn-miro" href="https://miro.com/app/board/uXjVG7PwTW0=/" target="_blank">
    ↗ Ouvrir dans Miro
  </a>
</header>
 
<div class="embed-wrap">
  <iframe
    src="https://miro.com/app/live-embed/uXjVG7PwTW0=/?focusWidget=3458764663742771564&embedMode=view_only_without_ui&embedId=93473794274"
    scrolling="no"
    allow="fullscreen; clipboard-read; clipboard-write"
    allowfullscreen>
  </iframe>
</div>
 
</body>
</html>
